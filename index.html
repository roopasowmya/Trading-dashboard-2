<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #060a12;
    --bg-2: #0a1120;
    --card: #0e1728;
    --card-hover: #111d34;
    --border: #1d2b45;
    --border-soft: #16223a;
    --teal: #2dd4bf;
    --teal-glow: rgba(45,212,191,0.35);
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --red-glow: rgba(248,113,113,0.4);
    --text: #e7edf6;
    --muted: #7c8aa5;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  *{ box-sizing: border-box; }
  html, body{ height: 100%; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    padding: 0 0 60px;
    overflow-x: hidden;
    position: relative;
  }

  /* Ambient animated backdrop */
  body::before{
    content:"";
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(circle at 20% 20%, rgba(45,212,191,0.07), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(96,165,250,0.06), transparent 45%),
      radial-gradient(circle at 50% 100%, rgba(52,211,153,0.05), transparent 40%);
    animation: drift 18s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes drift{
    0%{ transform: translate(0,0) scale(1); }
    100%{ transform: translate(-3%, 2%) scale(1.08); }
  }

  .wrap{ max-width: 1100px; margin: 0 auto; padding: 0 16px; position: relative; z-index: 1; }

  /* Ticker tape */
  .ticker{
    width: 100%;
    background: linear-gradient(90deg, #0a0f1c, #0d1524, #0a0f1c);
    border-bottom: 1px solid var(--border-soft);
    overflow: hidden;
    padding: 9px 0;
    margin-bottom: 28px;
  }
  .ticker-track{
    display: flex;
    width: max-content;
    animation: scroll-left 24s linear infinite;
  }
  .ticker-seg{
    display: flex;
    gap: 28px;
    padding-right: 28px;
    font-family: var(--mono);
    font-size: 12.5px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    color: var(--muted);
  }
  .ticker-seg span.hl{ color: var(--teal); font-weight: 700; }
  .ticker-seg span.dot{ color: var(--green); }
  @keyframes scroll-left{
    from{ transform: translateX(0); }
    to{ transform: translateX(-50%); }
  }

  header{ text-align:center; margin-bottom: 34px; }
  h1{
    font-size: clamp(28px, 6vw, 46px);
    margin: 0 0 8px;
    background: linear-gradient(90deg, #5eead4, #60a5fa, #5eead4);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 800;
    animation: shimmer 6s linear infinite;
  }
  @keyframes shimmer{
    0%{ background-position: 0% center; }
    100%{ background-position: 200% center; }
  }
  header p{ color: var(--muted); margin:0; font-size: 15px; font-family: var(--mono); }

  .clocks{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 26px;
  }
  @media (max-width: 600px){
    .clocks{ grid-template-columns: 1fr; }
  }
  .clock-card{
    background: linear-gradient(160deg, var(--card), var(--bg-2));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 20px;
    text-align:center;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .clock-card::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(120deg, transparent 40%, rgba(45,212,191,0.06) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }
  .clock-card:hover{
    transform: translateY(-4px);
    border-color: var(--teal);
    box-shadow: 0 10px 30px -12px var(--teal-glow);
  }
  .clock-card:hover::after{ transform: translateX(100%); }
  .clock-card .code{ font-size: 22px; font-weight: 800; letter-spacing: 2px; font-family: var(--mono); }
  .clock-card .zone{ color: var(--muted); font-size: 12px; letter-spacing: 1.2px; margin: 4px 0 20px; text-transform: uppercase; }
  .clock-card .time{
    font-size: clamp(30px, 6vw, 42px);
    font-weight: 700;
    color: var(--green);
    font-variant-numeric: tabular-nums;
    letter-spacing: 1px;
    font-family: var(--mono);
  }
  .clock-card .time .ampm{
    font-size: 0.4em;
    color: var(--teal);
    font-weight: 800;
    letter-spacing: 2px;
    vertical-align: middle;
    margin-left: 4px;
  }
  .clock-card .time .secs{
    display: inline-block;
    animation: pulse-secs 1s steps(1) infinite;
    color: var(--teal);
  }
  @keyframes pulse-secs{
    0%{ opacity: 1; }
    50%{ opacity: 0.55; }
    100%{ opacity: 1; }
  }
  .clock-card .date{ color: var(--muted); font-size: 12.5px; margin-top: 12px; font-family: var(--mono); }

  section.panel{
    background: linear-gradient(160deg, var(--card), var(--bg-2));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px 20px;
    margin-bottom: 20px;
  }
  section.panel h2{
    font-size: 14px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    margin: 0 0 18px;
    color: #cbd5e1;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  section.panel h2::before{
    content:"";
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 8px var(--teal);
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink{
    0%, 100%{ opacity: 1; }
    50%{ opacity: 0.3; }
  }

  .presets{ display:flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
  .preset-btn{
    background: #0f1830;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 9px;
    font-weight: 700;
    font-size: 13.5px;
    font-family: var(--mono);
    cursor: pointer;
    transition: transform 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
  }
  .preset-btn:hover{ border-color: var(--teal); color: var(--teal); box-shadow: 0 0 14px -4px var(--teal-glow); transform: translateY(-2px); }
  .preset-btn:active{ transform: translateY(0) scale(0.94); }
  .preset-btn:focus-visible, .add-btn:focus-visible, input:focus-visible{
    outline: 2px solid var(--teal); outline-offset: 2px;
  }

  .add-row{
    display:flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .add-row input{
    background: #0f1830;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 9px;
    font-size: 14px;
    font-family: var(--sans);
    transition: border-color 0.2s ease;
  }
  .add-row input:focus{ border-color: var(--teal); }
  .add-row input[name="tname"]{ flex: 2; min-width: 140px; }
  .add-row input[name="tmin"]{ flex: 1; min-width: 90px; }
  .add-btn{
    background: linear-gradient(135deg, var(--green), var(--teal));
    color: #06110d;
    border: none;
    padding: 12px 22px;
    border-radius: 9px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.15s ease, filter 0.15s ease;
  }
  .add-btn:hover{ filter: brightness(1.1); transform: translateY(-2px); }
  .add-btn:active{ transform: translateY(0) scale(0.95); }

  .timers-list{
    margin-top: 20px;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }
  .timer-card{
    background: #0f1830;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    display:flex;
    flex-direction: column;
    align-items:center;
    gap: 10px;
    text-align: center;
    animation: card-in 0.35s cubic-bezier(.2,.9,.3,1.2);
    transition: border-color 0.2s ease, transform 0.2s ease;
  }
  .timer-card:hover{ transform: translateY(-3px); border-color: var(--border-soft); }
  .timer-card.leaving{ animation: card-out 0.25s ease forwards; }
  @keyframes card-in{
    from{ opacity: 0; transform: translateY(12px) scale(0.96); }
    to{ opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes card-out{
    to{ opacity: 0; transform: scale(0.9); }
  }
  .timer-card.done{
    border-color: var(--red);
    box-shadow: 0 0 22px -8px var(--red-glow);
    animation: card-in 0.35s cubic-bezier(.2,.9,.3,1.2), shake-glow 1.1s ease-in-out infinite;
  }
  @keyframes shake-glow{
    0%, 100%{ box-shadow: 0 0 14px -8px var(--red-glow); }
    50%{ box-shadow: 0 0 28px -4px var(--red-glow); }
  }

  .ring-wrap{ position: relative; width: 108px; height: 108px; }
  .ring-wrap svg{ transform: rotate(-90deg); }
  .ring-bg{ fill:none; stroke: #1c2942; stroke-width: 8; }
  .ring-fg{
    fill:none;
    stroke: var(--green);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
  }
  .ring-center{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
  }
  .timer-name{ font-weight: 700; font-size: 14px; }
  .timer-actions{ display:flex; gap: 8px; align-items:center; margin-top: 4px; }
  .icon-btn{
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 7px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12.5px;
    font-family: var(--sans);
    transition: 0.15s ease;
  }
  .icon-btn:hover{ color: var(--red); border-color: var(--red); }
  .icon-btn.stop{ color: var(--amber); border-color: var(--amber); }
  .icon-btn.stop:hover{ background: rgba(251,191,36,0.1); }
  .empty-state{ color: var(--muted); font-size: 13px; text-align:center; padding: 20px 0; grid-column: 1 / -1; }
</style>
</head>
<body>

<div class="ticker">
  <div class="ticker-track" id="tickerTrack"></div>
</div>

<div class="wrap">
  <header>
    <h1>Trading Command Center</h1>
    <p>// your trading journey, all in one place</p>
  </header>

  <div class="clocks" id="clocks"></div>

  <section class="panel">
    <h2>Custom Timers</h2>
    <div class="presets" id="presets"></div>
    <div class="add-row">
      <input type="text" name="tname" id="tname" placeholder="Timer name...">
      <input type="number" name="tmin" id="tmin" placeholder="Minutes" min="1">
      <button class="add-btn" id="addBtn">+ Add</button>
    </div>
    <div class="timers-list" id="timersList"></div>
  </section>
</div>

<script>
  // ---------- World Clocks ----------
  const zones = [
    { code:"IN", label:"IST (India)", tz:"Asia/Kolkata" },
    { code:"NY", label:"New York (ET)", tz:"America/New_York" }
  ];

  const clocksEl = document.getElementById('clocks');
  clocksEl.innerHTML = zones.map((z,i) => `
    <div class="clock-card">
      <div class="code">${z.code}</div>
      <div class="zone">${z.label}</div>
      <div class="time" id="time-${i}">--:--:--</div>
      <div class="date" id="date-${i}">--</div>
    </div>
  `).join('');

  function pad(n){ return n.toString().padStart(2,'0'); }

  function updateClocks(){
    zones.forEach((z,i)=>{
      const now = new Date();
      const parts = new Intl.DateTimeFormat('en-US', {
        timeZone: z.tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true
      }).formatToParts(now);
      const h = parts.find(p=>p.type==='hour').value;
      const m = parts.find(p=>p.type==='minute').value;
      const s = parts.find(p=>p.type==='second').value;
      const ampm = parts.find(p=>p.type==='dayPeriod').value;
      const dateStr = new Intl.DateTimeFormat('en-US', {
        timeZone: z.tz, weekday:'short', day:'2-digit', month:'short', year:'numeric'
      }).format(now);
      document.getElementById(`time-${i}`).innerHTML = `${h}:${m}:<span class="secs">${s}</span> <span class="ampm">${ampm}</span>`;
      document.getElementById(`date-${i}`).textContent = dateStr;
    });
  }

  // ---------- Ticker tape ----------
  function tickerContent(){
    const now = new Date();
    const bits = zones.map(z=>{
      const t = new Intl.DateTimeFormat('en-US', {
        timeZone: z.tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true
      }).format(now);
      return `<span class="hl">${z.code}</span> ${t}`;
    }).join(' <span class="dot">&bull;</span> ');
    return `<div class="ticker-seg">${bits} <span class="dot">&bull;</span> LIVE MARKET CLOCK <span class="dot">&bull;</span> ${bits} <span class="dot">&bull;</span> LIVE MARKET CLOCK</div>`;
  }
  const tickerTrack = document.getElementById('tickerTrack');
  function updateTicker(){
    tickerTrack.innerHTML = tickerContent() + tickerContent();
  }

  // ---------- Custom Timers ----------
  const presetMinutes = [
    {label:"1m", min:1}, {label:"5m", min:5}, {label:"15m", min:15},
    {label:"30m", min:30}, {label:"1h", min:60}, {label:"2h", min:120}, {label:"4h", min:240}
  ];
  const presetsEl = document.getElementById('presets');
  presetsEl.innerHTML = presetMinutes.map(p => `<button class="preset-btn" data-min="${p.min}">${p.label}</button>`).join('');

  let timers = [];
  let timerId = 0;
  let audioCtx = null;
  const alarmNodes = {}; // id -> array of {osc,gain}

  function playAlarm(id){
    try{
      if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;
      const totalDuration = 10; // seconds
      const toneA = 988;   // B5
      const toneB = 1319;  // E6
      const toneLen = 0.15;
      const pairGap = 0.06;
      const burstGap = 0.35;
      let offset = 0;
      const nodes = [];
      while(offset < totalDuration){
        [toneA, toneB].forEach((freq, idx) => {
          const start = offset + idx * (toneLen + pairGap);
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.0001, now + start);
          gain.gain.exponentialRampToValueAtTime(0.28, now + start + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + start + toneLen);
          osc.connect(gain).connect(audioCtx.destination);
          osc.start(now + start);
          osc.stop(now + start + toneLen + 0.02);
          nodes.push({osc, gain});
        });
        offset += 2*(toneLen + pairGap) + burstGap;
      }
      alarmNodes[id] = nodes;
      nodes[nodes.length-1].osc.onended = () => {
        delete alarmNodes[id];
        renderTimers();
      };
    } catch(e){
      console.error('Alarm sound failed', e);
    }
  }

  function stopAlarm(id){
    const nodes = alarmNodes[id];
    if(!nodes) return;
    const now = audioCtx.currentTime;
    nodes.forEach(({osc, gain})=>{
      try{
        gain.gain.cancelScheduledValues(now);
        gain.gain.setValueAtTime(0.0001, now);
        osc.stop(now + 0.01);
      }catch(e){}
    });
    delete alarmNodes[id];
    renderTimers();
  }

  function addTimer(name, minutes){
    if(!minutes || minutes <= 0) return;
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){}
    }
    const totalMs = minutes*60*1000;
    timers.push({
      id: ++timerId,
      name: name && name.trim() ? name.trim() : `${minutes} min timer`,
      endsAt: Date.now() + totalMs,
      totalMs,
      alerted: false
    });
    renderTimers();
  }

  presetsEl.addEventListener('click', (e)=>{
    const btn = e.target.closest('.preset-btn');
    if(!btn) return;
    const min = Number(btn.dataset.min);
    const nameInput = document.getElementById('tname');
    addTimer(nameInput.value, min);
  });

  document.getElementById('addBtn').addEventListener('click', ()=>{
    const name = document.getElementById('tname').value;
    const min = Number(document.getElementById('tmin').value);
    addTimer(name, min);
    document.getElementById('tname').value = '';
    document.getElementById('tmin').value = '';
  });

  function removeTimer(id){
    stopAlarm(id);
    const card = document.querySelector(`[data-card="${id}"]`);
    if(card){
      card.classList.add('leaving');
      setTimeout(()=>{
        timers = timers.filter(t => t.id !== id);
        renderTimers();
      }, 230);
    } else {
      timers = timers.filter(t => t.id !== id);
      renderTimers();
    }
  }

  const CIRC = 2 * Math.PI * 46; // r=46

  function renderTimers(){
    const list = document.getElementById('timersList');
    if(timers.length === 0){
      list.innerHTML = `<div class="empty-state">No active timers. Pick a preset or add a custom one above.</div>`;
      return;
    }
    list.innerHTML = timers.map(t => {
      const remainMs = t.endsAt - Date.now();
      const done = remainMs <= 0;
      if(done && !t.alerted){
        t.alerted = true;
        playAlarm(t.id);
      }
      const pct = done ? 0 : Math.max(0, Math.min(1, remainMs / t.totalMs));
      const offset = CIRC * (1 - pct);
      let ringColor = 'var(--green)';
      if(pct < 0.2) ringColor = 'var(--red)';
      else if(pct < 0.45) ringColor = 'var(--amber)';
      const remainStr = done ? "DONE" : formatMs(remainMs);
      const isRinging = !!alarmNodes[t.id];
      return `
        <div class="timer-card ${done ? 'done' : ''}" data-card="${t.id}">
          <div class="ring-wrap">
            <svg width="108" height="108">
              <circle class="ring-bg" cx="54" cy="54" r="46"></circle>
              <circle class="ring-fg" cx="54" cy="54" r="46"
                style="stroke:${ringColor}; stroke-dasharray:${CIRC}; stroke-dashoffset:${offset};"></circle>
            </svg>
            <div class="ring-center">${remainStr}</div>
          </div>
          <div class="timer-name">${escapeHtml(t.name)}</div>
          <div class="timer-actions">
            ${isRinging ? `<button class="icon-btn stop" data-stop="${t.id}">Stop sound</button>` : ''}
            <button class="icon-btn" data-remove="${t.id}">Remove</button>
          </div>
        </div>
      `;
    }).join('');
  }

  document.getElementById('timersList').addEventListener('click', (e)=>{
    const rm = e.target.closest('[data-remove]');
    if(rm){ removeTimer(Number(rm.dataset.remove)); return; }
    const st = e.target.closest('[data-stop]');
    if(st){ stopAlarm(Number(st.dataset.stop)); }
  });

  function formatMs(ms){
    let totalSec = Math.floor(ms/1000);
    const h = Math.floor(totalSec/3600); totalSec -= h*3600;
    const m = Math.floor(totalSec/60); totalSec -= m*60;
    const s = totalSec;
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- Main loop ----------
  function tick(){
    updateClocks();
    updateTicker();
    renderTimers();
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
